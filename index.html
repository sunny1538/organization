<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>नशा मुक्ति अभियान — आवेदन प्रणाली</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600&display=swap');

:root{
  --forest:#151A2E;
  --forest-2:#2A3355;
  --sage:#6B7394;
  --paper:#F4F1EC;
  --paper-2:#E9E4D8;
  --gold:#E8863B;
  --gold-2:#F0A968;
  --maroon:#B23A3A;
  --maroon-2:#C24F4F;
  --ink:#1B1E2C;
  --ink-soft:#565C78;
  --line:#D9D3C4;
  --white:#FFFFFF;
}
*{box-sizing:border-box;}
body{margin:0;padding:0;background:var(--paper);color:var(--ink);
  font-family:'Noto Sans Devanagari','Noto Sans',sans-serif;}
.app{min-height:100vh;background:
  radial-gradient(circle at 10% 0%, #1c4a34 0%, transparent 45%),
  var(--paper);}

.header{background:linear-gradient(135deg,var(--forest) 0%,var(--forest-2) 100%);
  color:var(--white);padding:22px 20px 26px;position:relative;overflow:hidden;
  border-bottom:4px solid var(--gold);}
.header::after{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;
  border-radius:50%;border:1px solid rgba(227,190,99,0.18);}
.header::before{content:"";position:absolute;right:-10px;top:20px;width:150px;height:150px;
  border-radius:50%;border:1px solid rgba(227,190,99,0.14);}
.header-inner{max-width:920px;margin:0 auto;display:flex;align-items:center;gap:16px;position:relative;z-index:1;}
.logo-seal{width:56px;height:56px;border-radius:50%;background:var(--gold);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.5);font-size:26px;}
.header h1{font-family:'Poppins',sans-serif;font-weight:900;font-size:26px;margin:0 0 4px;letter-spacing:0.3px;}
.header p{margin:0;font-size:13.5px;color:var(--gold-2);letter-spacing:0.4px;}
.conn-dot{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--gold-2);
  background:rgba(0,0,0,0.18);padding:4px 10px;border-radius:20px;position:absolute;right:20px;top:20px;}
.conn-dot .dot{width:7px;height:7px;border-radius:50%;background:#6FCF97;}
.conn-dot.off .dot{background:#E06A5E;}

.tabbar{max-width:920px;margin:0 auto;display:flex;gap:6px;padding:14px 20px 0;flex-wrap:wrap;}
.tab-btn{border:1px solid var(--line);background:var(--white);color:var(--ink-soft);
  padding:10px 16px;border-radius:10px 10px 0 0;font-size:14.5px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .15s ease;border-bottom:none;}
.tab-btn.active{background:var(--paper);color:var(--forest);border-color:var(--forest);
  box-shadow:0 -2px 0 var(--gold) inset;}
.tab-btn:hover:not(.active){background:var(--paper-2);}

.content{max-width:920px;margin:0 auto;padding:22px 20px 60px;}
.card{background:var(--white);border:1px solid var(--line);border-radius:4px;
  box-shadow:0 1px 3px rgba(18,53,36,0.06);}

.form-meta{display:flex;justify-content:space-between;align-items:flex-start;
  padding:18px 22px;border-bottom:2px solid var(--forest);flex-wrap:wrap;gap:10px;}
.form-meta h2{font-family:'Poppins',sans-serif;font-size:20px;margin:0;color:var(--forest);}
.form-meta .meta-right{text-align:right;font-size:12.5px;color:var(--ink-soft);}
.fee-note{display:inline-flex;align-items:center;gap:8px;background:#FCF6E5;
  border:1px solid var(--gold-2);color:#7A5B12;padding:8px 14px;border-radius:6px;
  font-size:13.5px;font-weight:600;margin:16px 22px 0;}

.section{padding:18px 22px;border-bottom:1px solid var(--line);}
.section:last-of-type{border-bottom:none;}
.section-title{display:flex;align-items:center;gap:10px;margin:0 0 16px;}
.section-num{width:26px;height:26px;border-radius:50%;background:var(--forest);color:var(--white);
  font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.section-title h3{font-family:'Poppins',sans-serif;font-size:16.5px;margin:0;color:var(--forest);}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;}
@media(max-width:600px){.grid2{grid-template-columns:1fr;}}
.field label{display:block;font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.field label .req{color:var(--maroon);}
.field input[type=text],.field input[type=tel],.field input[type=email],
.field input[type=date],.field input[type=number],.field select,.field textarea{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;
  font-family:inherit;font-size:14.5px;background:var(--paper);color:var(--ink);}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--sage);outline-offset:1px;background:var(--white);}
.field textarea{resize:vertical;min-height:64px;}
.hint{font-size:12px;color:var(--ink-soft);margin-top:4px;}
.radio-row,.check-row{display:flex;gap:18px;flex-wrap:wrap;padding-top:2px;}
.radio-opt,.check-opt{display:flex;align-items:center;gap:7px;font-size:14px;cursor:pointer;}
.radio-opt input,.check-opt input{width:16px;height:16px;accent-color:var(--forest);cursor:pointer;}

.photo-box{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.photo-preview{width:110px;height:110px;border-radius:8px;border:2px dashed var(--line);
  background:var(--paper);display:flex;align-items:center;justify-content:center;overflow:hidden;
  color:var(--ink-soft);font-size:11.5px;text-align:center;flex-shrink:0;}
.photo-preview img{width:100%;height:100%;object-fit:cover;}
.photo-actions{display:flex;gap:10px;flex-wrap:wrap;}
.photo-actions label.btn{display:inline-flex;align-items:center;gap:6px;}

.declaration{background:var(--paper-2);border:1px dashed var(--line);border-radius:6px;padding:14px 16px;font-size:13.5px;color:var(--ink-soft);line-height:1.6;}
.declaration label{display:flex;gap:10px;align-items:flex-start;cursor:pointer;color:var(--ink);font-weight:500;}
.declaration input{margin-top:3px;width:16px;height:16px;accent-color:var(--forest);flex-shrink:0;}

.submit-bar{padding:20px 22px;display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;}
.btn{border:none;border-radius:7px;padding:12px 26px;font-family:inherit;font-size:15px;
  font-weight:700;cursor:pointer;transition:transform .1s ease, filter .15s ease;}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--forest);color:var(--white);}
.btn-primary:hover{filter:brightness(1.1);}
.btn-primary:disabled{background:#9AA79E;cursor:not-allowed;}
.btn-gold{background:var(--gold);color:#3B2C09;}
.btn-outline{background:transparent;border:1.5px solid var(--forest);color:var(--forest);}
.btn-approve{background:#2C6E49;color:#fff;}
.btn-decline{background:var(--maroon);color:#fff;}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:6px;}
.err{color:var(--maroon);font-size:12.5px;margin-top:8px;}

.success-wrap{text-align:center;padding:50px 24px;}
.stamp{width:120px;height:120px;border-radius:50%;border:4px solid var(--forest);
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  color:var(--forest);font-weight:900;font-size:15px;text-align:center;line-height:1.3;
  transform:rotate(-8deg);animation:stampIn .5s cubic-bezier(.2,1.4,.4,1);
  font-family:'Poppins',sans-serif;box-shadow:0 0 0 3px var(--paper) inset;}
@keyframes stampIn{from{transform:rotate(-8deg) scale(2.4);opacity:0;}to{transform:rotate(-8deg) scale(1);opacity:1;}}
.app-no{display:inline-block;background:var(--paper-2);border:1px solid var(--line);
  padding:10px 18px;border-radius:8px;font-family:monospace;font-size:18px;font-weight:700;
  letter-spacing:1px;color:var(--forest);margin:14px 0;}

.status-search{display:flex;gap:10px;flex-wrap:wrap;padding:22px;}
.status-search input{flex:1;min-width:180px;padding:11px 14px;border:1px solid var(--line);
  border-radius:7px;font-family:inherit;font-size:14.5px;background:var(--paper);}
.status-card{margin:0 22px 22px;border:1px solid var(--line);border-radius:8px;padding:22px;
  background:var(--paper-2);text-align:center;}
.status-photo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--white);
  box-shadow:0 0 0 2px var(--line);margin-bottom:10px;}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;
  font-size:13px;font-weight:700;letter-spacing:0.3px;}
.badge.pending{background:#FCEFD0;color:#8A6416;}
.badge.approved{background:#D9F0DE;color:#1F6B37;}
.badge.declined{background:#F6DAD6;color:var(--maroon);}

.admin-login{max-width:380px;margin:40px auto;padding:30px;text-align:center;}
.admin-login input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:7px;
  font-family:inherit;font-size:14.5px;margin:14px 0;background:var(--paper);text-align:center;letter-spacing:2px;}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px;}
@media(max-width:700px){.stats{grid-template-columns:repeat(3,1fr);}}
@media(max-width:420px){.stats{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:14px;text-align:center;}
.stat .num{font-size:24px;font-weight:800;color:var(--forest);font-family:'Poppins',sans-serif;}
.stat .lbl{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.admin-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.admin-toolbar input[type=text]{flex:1;min-width:200px;padding:10px 14px;border:1px solid var(--line);
  border-radius:7px;font-family:inherit;font-size:14px;background:var(--white);}
.filter-chip{padding:8px 14px;border-radius:20px;border:1px solid var(--line);background:var(--white);
  font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink-soft);}
.filter-chip.active{background:var(--forest);color:#fff;border-color:var(--forest);}
.app-row{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:14px 16px;
  margin-bottom:10px;cursor:pointer;transition:box-shadow .15s ease;display:flex;gap:12px;align-items:center;}
.app-row:hover{box-shadow:0 2px 8px rgba(18,53,36,0.08);}
.app-row-thumb{width:42px;height:42px;border-radius:50%;object-fit:cover;background:var(--paper-2);flex-shrink:0;}
.app-row-top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;flex:1;}
.app-row-name{font-weight:700;font-size:15px;color:var(--forest);}
.app-row-sub{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}
.empty{text-align:center;padding:50px 20px;color:var(--ink-soft);}
.loading{text-align:center;padding:40px;color:var(--ink-soft);font-size:14px;}

.modal-bg{position:fixed;inset:0;background:rgba(18,53,36,0.55);display:flex;align-items:center;
  justify-content:center;z-index:50;padding:20px;}
.modal{background:var(--white);border-radius:10px;max-width:560px;width:100%;max-height:86vh;
  overflow-y:auto;padding:0;}
.modal-head{background:var(--forest);color:#fff;padding:16px 22px;display:flex;justify-content:space-between;
  align-items:center;border-radius:10px 10px 0 0;position:sticky;top:0;}
.modal-head h3{margin:0;font-family:'Poppins',sans-serif;font-size:17px;}
.modal-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;}
.modal-body{padding:18px 22px;}
.modal-photo{width:96px;height:96px;border-radius:8px;object-fit:cover;border:1px solid var(--line);margin-bottom:14px;}
.detail-row{display:grid;grid-template-columns:150px 1fr;gap:8px;padding:7px 0;border-bottom:1px solid var(--paper-2);font-size:13.5px;}
.detail-row .k{color:var(--ink-soft);font-weight:600;}
.modal-actions{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--forest);
  color:#fff;padding:12px 22px;border-radius:8px;font-size:14px;font-weight:600;z-index:100;
  box-shadow:0 4px 14px rgba(0,0,0,0.2);}
.note{font-size:11.5px;color:var(--ink-soft);text-align:center;padding:10px 22px 0;}
.setup-warning{background:#FCEFD0;border:1px solid var(--gold-2);color:#7A5B12;padding:14px 18px;
  border-radius:8px;font-size:13px;margin-bottom:18px;line-height:1.6;}

/* ---------- Stepper ---------- */
.stepper{display:flex;align-items:flex-start;justify-content:center;gap:0;padding:18px 16px 20px;
  background:var(--white);border-bottom:1px solid var(--line);}
.step{display:flex;flex-direction:column;align-items:center;flex:1;max-width:150px;position:relative;}
.step-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;border:2px solid var(--line);background:var(--white);color:var(--ink-soft);
  transition:all .2s ease;flex-shrink:0;z-index:1;}
.step.done .step-circle{background:var(--forest);border-color:var(--forest);color:#fff;}
.step.active .step-circle{background:var(--gold);border-color:var(--gold);color:#3B2C09;box-shadow:0 0 0 4px rgba(199,154,61,0.18);}
.step-label{font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-top:7px;text-align:center;letter-spacing:.2px;}
.step.done .step-label,.step.active .step-label{color:var(--forest);}
.step-line{position:absolute;top:16px;left:calc(-50% + 16px);right:calc(50% + 16px);height:2px;background:var(--line);z-index:0;}
.step.done .step-line{background:var(--forest);}
.step:first-child .step-line{display:none;}
@media(max-width:520px){.step-label{font-size:10px;}.step-circle{width:26px;height:26px;font-size:12px;}.step-line{top:13px;}}

/* ---------- Payment ---------- */
.pay-wrap{padding:34px 22px;text-align:center;}
.pay-amount{font-family:'Poppins',sans-serif;font-size:38px;font-weight:900;color:var(--forest);margin:6px 0 2px;}
.pay-box{max-width:360px;margin:20px auto 0;background:var(--paper-2);border:1px dashed var(--line);
  border-radius:10px;padding:20px;text-align:left;}
.pay-box .row{display:flex;justify-content:space-between;font-size:13.5px;padding:6px 0;border-bottom:1px solid var(--line);}
.pay-box .row:last-child{border-bottom:none;}
.pay-btn-upi{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#3B2C09;
  padding:13px 26px;border-radius:8px;font-weight:800;font-size:15px;text-decoration:none;margin-top:18px;}
.pay-field{max-width:360px;margin:20px auto 0;text-align:left;}
.pay-field label{display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.pay-field input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:7px;
  font-family:inherit;font-size:14.5px;background:var(--white);text-align:center;letter-spacing:1px;}
.pay-note{font-size:12px;color:var(--ink-soft);max-width:380px;margin:12px auto 0;line-height:1.6;}
.pay-status-pill{display:inline-flex;align-items:center;gap:6px;background:#FCEFD0;color:#8A6416;
  padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;margin-top:10px;}

/* ---------- Certificate / Volunteer ID ---------- */
.cert-wrap{padding:30px 20px;}
.cert-card{max-width:480px;margin:0 auto;background:var(--white);border:3px solid var(--forest);
  border-radius:12px;padding:26px 24px;position:relative;overflow:hidden;}
.cert-card::before{content:"";position:absolute;inset:8px;border:1px solid var(--gold-2);border-radius:8px;pointer-events:none;}
.cert-head{text-align:center;border-bottom:2px solid var(--gold);padding-bottom:14px;margin-bottom:16px;}
.cert-head .seal{font-size:30px;}
.cert-head h3{font-family:'Poppins',sans-serif;color:var(--forest);margin:6px 0 2px;font-size:19px;}
.cert-head p{margin:0;font-size:11.5px;color:var(--ink-soft);letter-spacing:.4px;}
.cert-body{display:flex;gap:16px;align-items:center;}
.cert-photo{width:84px;height:84px;border-radius:8px;object-fit:cover;border:2px solid var(--line);flex-shrink:0;}
.cert-photo-ph{width:84px;height:84px;border-radius:8px;background:var(--paper-2);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink-soft);text-align:center;}
.cert-name{font-family:'Poppins',sans-serif;font-size:18px;color:var(--forest);margin:0 0 4px;}
.cert-id{font-family:monospace;font-weight:700;color:var(--maroon);font-size:14px;}
.cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin-top:16px;font-size:12.5px;}
.cert-grid .k{color:var(--ink-soft);}
.cert-grid .v{font-weight:700;color:var(--ink);}
.cert-foot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:22px;padding-top:14px;border-top:1px dashed var(--line);}
.cert-sign{font-family:'Poppins',sans-serif;font-size:15px;color:var(--forest);border-top:1px solid var(--ink-soft);padding-top:4px;}
.cert-stampmini{width:60px;height:60px;border-radius:50%;border:2px solid var(--gold);display:flex;
  align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--forest);text-align:center;
  transform:rotate(-10deg);font-family:'Poppins',sans-serif;line-height:1.2;}
.cert-actions{max-width:480px;margin:20px auto 0;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
@media print{
  body *{visibility:hidden;}
  .cert-card,.cert-card *{visibility:visible;}
  .cert-card{position:absolute;top:0;left:0;margin:0;box-shadow:none;}
}

/* ---------- Mobile polish ---------- */
@media(max-width:600px){
  .header{padding:16px 14px 20px;}
  .header h1{font-size:20px;}
  .header p{font-size:12px;}
  .logo-seal{width:44px;height:44px;font-size:20px;}
  .conn-dot{position:static;display:inline-flex;margin-top:8px;}
  .header-inner{flex-wrap:wrap;}
  .tabbar{padding:10px 12px 0;gap:4px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;}
  .tab-btn{padding:9px 12px;font-size:13px;white-space:nowrap;flex-shrink:0;}
  .content{padding:14px 10px 40px;}
  .form-meta{padding:14px 16px;}
  .form-meta h2{font-size:17px;}
  .fee-note{margin:12px 16px 0;font-size:12.5px;padding:8px 12px;}
  .section{padding:14px 16px;}
  .section-title h3{font-size:15px;}
  .field input,.field select,.field textarea{font-size:16px;padding:11px 12px;}
  .submit-bar{padding:16px;}
  .submit-bar .btn{width:100%;}
  .status-search{flex-direction:column;padding:16px;}
  .status-search .btn{width:100%;}
  .admin-toolbar{flex-direction:column;align-items:stretch;}
  .admin-toolbar .filter-chip{flex:1;text-align:center;}
  .modal{max-height:92vh;border-radius:10px 10px 0 0;}
  .modal-bg{align-items:flex-end;padding:0;}
  .modal{max-width:100%;}
  .detail-row{grid-template-columns:120px 1fr;font-size:12.5px;}
  .pay-btn-upi{width:100%;justify-content:center;}
  .pay-box,.pay-field,.pay-note{max-width:100%;}
  .cert-card{padding:18px 16px;}
  .cert-body{flex-wrap:wrap;}
  .cert-actions .btn{flex:1;min-width:130px;}
  .admin-login{margin:20px auto;padding:22px 18px;}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback} = React;

/* ---------- Supabase setup ---------- */
const SUPABASE_URL = "https://teoudlvdneuxjqftnfnr.supabase.co";
const SUPABASE_KEY = "sb_publishable_hJMf8h4IyVydRoiDJ1VHCA_dwxyDfjQ";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const TABLE = "registrations";

/* ---------- Payment / Org config — apna sahi UPI ID yahin daal do ---------- */
const UPI_ID = "yourupi@bank";        // TODO: apna asli UPI ID daalein
const UPI_PAYEE_NAME = "Nasha Mukti Abhiyan";
const ORG_NAME = "नशा मुक्ति अभियान";
const FEE_AMOUNT = 199;
function buildUpiLink(appNo){
  const note = encodeURIComponent(`Volunteer ID Fee ${appNo}`);
  return `upi://pay?pa=${encodeURIComponent(UPI_ID)}&pn=${encodeURIComponent(UPI_PAYEE_NAME)}&am=${FEE_AMOUNT}&cu=INR&tn=${note}`;
}

function pad(n,len){return String(n).padStart(len,'0');}
function todayStr(){
  const d=new Date();
  return `${pad(d.getDate(),2)}/${pad(d.getMonth()+1,2)}/${d.getFullYear()}`;
}
function calcAge(dobStr){
  if(!dobStr) return '';
  const dob=new Date(dobStr);
  if(isNaN(dob)) return '';
  const t=new Date();
  let age=t.getFullYear()-dob.getFullYear();
  const m=t.getMonth()-dob.getMonth();
  if(m<0 || (m===0 && t.getDate()<dob.getDate())) age--;
  return age>=0 && age<120 ? age : '';
}

function genAppNo(existingCount){
  const y=new Date().getFullYear();
  return `NMA/${y}/${pad(existingCount+1,4)}`;
}

/* camelCase <-> snake_case row mapping */
function toRow(f){
  return {
    app_no: f.id, position: f.position, name: f.name, parent_name: f.parentName,
    dob: f.dob || null, gender: f.gender, mobile: f.mobile, email: f.email,
    village: f.village, post: f.post, tehsil: f.tehsil, district: f.district,
    state: f.state, pin: f.pin,
    qualification: f.qualification, qualification_other: f.qualificationOther,
    board: f.board, pass_year: f.passYear, percent: f.percent,
    experience_detail: f.experienceDetail, experience_years: f.experienceYears,
    has_vehicle: f.hasVehicle, vehicle_no: f.vehicleNo,
    has_license: f.hasLicense, license_no: f.licenseNo,
    area: f.area, docs: f.docs, docs_other: f.docsOther,
    place: f.place, signature: f.signature,
    photo_base64: f.photo || null,
    status: f.status, submitted_at: f.submittedAt,
    payment_status: f.paymentStatus || "unpaid", utr: f.utr || null, paid_at: f.paidAt || null
  };
}
function fromRow(r){
  return {
    id: r.app_no, position: r.position, name: r.name, parentName: r.parent_name,
    dob: r.dob, gender: r.gender, mobile: r.mobile, email: r.email,
    village: r.village, post: r.post, tehsil: r.tehsil, district: r.district,
    state: r.state, pin: r.pin,
    qualification: r.qualification, qualificationOther: r.qualification_other,
    board: r.board, passYear: r.pass_year, percent: r.percent,
    experienceDetail: r.experience_detail, experienceYears: r.experience_years,
    hasVehicle: r.has_vehicle, vehicleNo: r.vehicle_no,
    hasLicense: r.has_license, licenseNo: r.license_no,
    area: r.area, docs: r.docs || [], docsOther: r.docs_other,
    place: r.place, signature: r.signature,
    photo: r.photo_base64 || "",
    status: r.status, submittedAt: r.submitted_at,
    submittedDate: r.submitted_at ? new Date(r.submitted_at).toLocaleDateString('en-GB') : '',
    paymentStatus: r.payment_status || "unpaid", utr: r.utr || "", paidAt: r.paid_at || ""
  };
}

async function dbInsert(record){
  const {data,error} = await sb.from(TABLE).insert([toRow(record)]).select();
  if(error) throw error;
  return data && data[0] ? fromRow(data[0]) : record;
}
async function dbCount(){
  const {count,error} = await sb.from(TABLE).select('*',{count:'exact',head:true});
  if(error) return 0;
  return count || 0;
}
async function dbFetchByAppNo(appNo){
  const {data,error} = await sb.from(TABLE).select('*').eq('app_no',appNo).maybeSingle();
  if(error || !data) return null;
  return fromRow(data);
}
async function dbFetchAll(){
  const {data,error} = await sb.from(TABLE).select('*').order('submitted_at',{ascending:false});
  if(error) throw error;
  return (data||[]).map(fromRow);
}
async function dbUpdateStatus(appNo,status){
  const {error} = await sb.from(TABLE).update({status}).eq('app_no',appNo);
  if(error) throw error;
}
async function dbUpdatePayment(appNo,fields){
  const {error} = await sb.from(TABLE).update(fields).eq('app_no',appNo);
  if(error) throw error;
}

/* resize + compress a photo file to a small base64 jpeg */
function fileToCompressedBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const maxW=480;
        const scale=Math.min(1,maxW/img.width);
        const canvas=document.createElement('canvas');
        canvas.width=img.width*scale;
        canvas.height=img.height*scale;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',0.7));
      };
      img.onerror=reject;
      img.src=reader.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function Field({label,required,children,hint}){
  return (
    <div className="field">
      <label>{label}{required && <span className="req"> *</span>}</label>
      {children}
      {hint && <div className="hint">{hint}</div>}
    </div>
  );
}

function PhotoField({photo,onChange}){
  const fileRef=useRef(null);
  const camRef=useRef(null);
  const [busy,setBusy]=useState(false);
  const handleFile=async(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    setBusy(true);
    try{
      const b64=await fileToCompressedBase64(file);
      onChange(b64);
    }catch(err){ /* ignore */ }
    setBusy(false);
    e.target.value="";
  };
  return (
    <div className="photo-box">
      <div className="photo-preview">
        {photo ? <img src={photo} alt="फोटो"/> : (busy? "लोड हो रहा..." : "फोटो नहीं चुनी गई")}
      </div>
      <div className="photo-actions">
        <label className="btn btn-outline btn-sm">
          📁 गैलरी से चुनें
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>
        </label>
        <label className="btn btn-outline btn-sm">
          📷 कैमरा से खींचें
          <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleFile}/>
        </label>
        {photo && <button type="button" className="btn btn-outline btn-sm" onClick={()=>onChange("")}>हटाएं</button>}
      </div>
    </div>
  );
}

function Stepper({stage}){
  const steps=[["form","फॉर्म"],["payment","भुगतान"],["certificate","प्रमाणपत्र"]];
  const idx=steps.findIndex(s=>s[0]===stage);
  return (
    <div className="stepper">
      {steps.map(([key,label],i)=>(
        <div className={`step ${i<idx?'done':''} ${i===idx?'active':''}`} key={key}>
          {i>0 && <div className="step-line"/>}
          <div className="step-circle">{i<idx?'✓':i+1}</div>
          <div className="step-label">{label}</div>
        </div>
      ))}
    </div>
  );
}

function RegistrationForm(){
  const [f,setF]=useState(emptyForm);
  const [error,setError]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [result,setResult]=useState(null);
  const [utrInput,setUtrInput]=useState("");
  const [payErr,setPayErr]=useState("");
  const [payBusy,setPayBusy]=useState(false);

  const set=(k,v)=>setF(prev=>({...prev,[k]:v}));
  const toggleDoc=(doc)=>{
    setF(prev=>{
      const has=prev.docs.includes(doc);
      return {...prev, docs: has? prev.docs.filter(d=>d!==doc): [...prev.docs,doc]};
    });
  };

  const validate=()=>{
    if(!f.position.trim()) return "कृपया पद हेतु आवेदन भरें।";
    if(!f.name.trim()) return "कृपया आवेदक का नाम भरें।";
    if(!f.dob) return "कृपया जन्म तिथि भरें।";
    if(!f.gender) return "कृपया लिंग चुनें।";
    if(!/^[6-9]\d{9}$/.test(f.mobile)) return "कृपया मान्य 10 अंकों का मोबाइल नंबर भरें।";
    if(!f.district.trim() || !f.state.trim()) return "कृपया जिला और राज्य भरें।";
    if(f.pin && !/^\d{6}$/.test(f.pin)) return "पिन कोड 6 अंकों का होना चाहिए।";
    if(!f.qualification) return "कृपया शैक्षणिक योग्यता चुनें।";
    if(!f.hasVehicle) return "कृपया दोपहिया वाहन संबंधी प्रश्न का उत्तर दें।";
    if(!f.hasLicense) return "कृपया ड्राइविंग लाइसेंस संबंधी प्रश्न का उत्तर दें।";
    if(!f.area) return "कृपया कार्यक्षेत्र चुनें।";
    if(!f.declared) return "कृपया घोषणा स्वीकार करें।";
    if(!f.signature.trim()) return "कृपया हस्ताक्षर हेतु अपना नाम टाइप करें।";
    return "";
  };

  const submit=async()=>{
    const err=validate();
    if(err){ setError(err); return; }
    setError(""); setSubmitting(true);
    try{
      const count=await dbCount();
      const appNo=genAppNo(count);
      const record={...f, id:appNo, status:"pending", submittedAt:new Date().toISOString()};
      const saved=await dbInsert(record);
      setResult({...record, submittedDate: todayStr()});
    }catch(e){
      setError("जमा करते समय त्रुटि हुई। कृपया सुनिश्चित करें कि Supabase टेबल सही तरीके से बन चुकी है, फिर पुनः प्रयास करें।");
    }
    setSubmitting(false);
  };

  /* keep result in sync with DB (admin approval / payment verification) */
  useEffect(()=>{
    if(!result) return;
    const refresh=async()=>{
      const fresh=await dbFetchByAppNo(result.id);
      if(fresh) setResult(prev=>({...prev,...fresh}));
    };
    const channel = sb.channel(`myapp-${result.id}`)
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:TABLE,filter:`app_no=eq.${result.id}`},
        payload=>{ setResult(prev=>({...prev,...fromRow(payload.new)})); })
      .subscribe();
    const poll=setInterval(refresh,6000);
    return ()=>{ sb.removeChannel(channel); clearInterval(poll); };
  },[result && result.id]);

  const confirmPayment=async()=>{
    if(!utrInput.trim()){ setPayErr("कृपया UTR / लेन-देन संख्या भरें।"); return; }
    setPayErr(""); setPayBusy(true);
    try{
      await dbUpdatePayment(result.id,{payment_status:"pending_verification", utr:utrInput.trim(), paid_at:new Date().toISOString()});
      setResult(prev=>({...prev, paymentStatus:"pending_verification", utr:utrInput.trim()}));
    }catch(e){
      setPayErr("भुगतान जानकारी सुरक्षित नहीं हो सकी। पुनः प्रयास करें।");
    }
    setPayBusy(false);
  };

  if(result){
    const stage = (result.paymentStatus==="paid" && result.status==="approved") ? "certificate" : "payment";

    if(stage==="payment"){
      return (
        <div className="card">
          <Stepper stage="payment"/>
          <div className="pay-wrap">
            <div style={{fontSize:13,color:"var(--ink-soft)"}}>आवेदन सफलतापूर्वक जमा हुआ — आवेदन संख्या</div>
            <div className="app-no">{result.id}</div>
            <div style={{marginTop:18,fontSize:13.5,color:"var(--ink-soft)"}}>वॉलंटियर ID शुल्क</div>
            <div className="pay-amount">₹{FEE_AMOUNT}</div>

            {result.paymentStatus==="pending_verification" ? (
              <>
                <div className="pay-status-pill">⏳ भुगतान सत्यापन हेतु लंबित</div>
                <p className="pay-note">आपका UTR ({result.utr}) प्राप्त हो गया है। एडमिन द्वारा सत्यापन के बाद यह पृष्ठ स्वतः अगले चरण (प्रमाणपत्र) पर बढ़ जाएगा।</p>
              </>
            ) : (
              <>
                <div className="pay-box">
                  <div className="row"><span>UPI ID</span><strong>{UPI_ID}</strong></div>
                  <div className="row"><span>प्राप्तकर्ता</span><strong>{UPI_PAYEE_NAME}</strong></div>
                  <div className="row"><span>राशि</span><strong>₹{FEE_AMOUNT}</strong></div>
                </div>
                <a className="pay-btn-upi" href={buildUpiLink(result.id)}>📲 UPI ऐप से भुगतान करें</a>
                <p className="pay-note">भुगतान के बाद अपने UPI ऐप से मिला UTR / लेन-देन संख्या नीचे भरें और पुष्टि करें। एडमिन सत्यापन के बाद आपका प्रमाणपत्र जारी होगा।</p>
                <div className="pay-field">
                  <label>UTR / लेन-देन संख्या *</label>
                  <input type="text" value={utrInput} onChange={e=>setUtrInput(e.target.value)} placeholder="जैसे 302512345678"/>
                </div>
                {payErr && <div className="err">{payErr}</div>}
                <div style={{marginTop:16}}>
                  <button className="btn btn-primary" disabled={payBusy} onClick={confirmPayment}>
                    {payBusy?"सुरक्षित हो रहा है...":"भुगतान की पुष्टि करें"}
                  </button>
                </div>
              </>
            )}
            <p className="pay-note" style={{marginTop:20}}>आप "स्थिति जांचें" टैब में जाकर मोबाइल नंबर व आवेदन संख्या से अपनी प्रगति कभी भी देख सकते हैं।</p>
          </div>
        </div>
      );
    }

    return (
      <div className="card">
        <Stepper stage="certificate"/>
        <CertificateView rec={result}/>
        <div className="cert-actions">
          <button className="btn btn-gold" onClick={()=>window.print()}>🖨 प्रिंट करें</button>
          <button className="btn btn-outline" onClick={()=>{setResult(null); setF(emptyForm); setUtrInput("");}}>नया आवेदन भरें</button>
        </div>
      </div>
    );
  }

  return (
    <div className="card">
      <Stepper stage="form"/>
      <div className="form-meta">
        <h2>नौकरी हेतु आवेदन पत्र</h2>
        <div className="meta-right">दिनांक: {todayStr()}</div>
      </div>
      <div className="fee-note">₹ आवेदन शुल्क: मात्र ₹200/- (केवल दो सौ रुपये मात्र)</div>

      <div className="section">
        <Field label="पद हेतु आवेदन" required>
          <input type="text" value={f.position} onChange={e=>set('position',e.target.value)} placeholder="जिस पद हेतु आवेदन कर रहे हैं वह लिखें"/>
        </Field>
      </div>

      <div className="section">
        <div className="section-title"><div className="section-num">1</div><h3>व्यक्तिगत जानकारी</h3></div>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:13.5,fontWeight:600,marginBottom:8,display:'block'}}>पासपोर्ट साइज़ फोटो</label>
          <PhotoField photo={f.photo} onChange={v=>set('photo',v)}/>
        </div>
        <div className="grid2">
          <Field label="आवेदक का नाम" required><input type="text" value={f.name} onChange={e=>set('name',e.target.value)}/></Field>
          <Field label="पिता / पति का नाम"><input type="text" value={f.parentName} onChange={e=>set('parentName',e.target.value)}/></Field>
          <Field label="जन्म तिथि" required><input type="date" value={f.dob} onChange={e=>set('dob',e.target.value)}/></Field>
          <Field label="आयु" hint="जन्म तिथि से स्वतः गणना"><input type="text" value={calcAge(f.dob)} readOnly/></Field>

function StatusBadge({status}){
  const map={pending:["लंबित","pending"],approved:["स्वीकृत","approved"],declined:["अस्वीकृत","declined"]};
  const [label,cls]=map[status]||map.pending;
  return <span className={`badge ${cls}`}>{label}</span>;
}

function PaymentBadge({paymentStatus}){
  const map={
    unpaid:["भुगतान बकाया","declined"],
    pending_verification:["सत्यापन लंबित","pending"],
    paid:["भुगतान हुआ","approved"]
  };
  const [label,cls]=map[paymentStatus]||map.unpaid;
  return <span className={`badge ${cls}`}>{label}</span>;
}

function StatusCheck(){
  const [mobile,setMobile]=useState("");
  const [appNo,setAppNo]=useState("");
  const [rec,setRec]=useState(null);
  const [err,setErr]=useState("");
  const [checked,setChecked]=useState(false);
  const chanRef=useRef(null);

  const check=useCallback(async(silent)=>{
    if(!silent) setErr("");
    if(!appNo.trim()){ if(!silent) setErr("कृपया आवेदन पत्र संख्या भरें।"); return; }
    try{
      const data=await dbFetchByAppNo(appNo.trim());
      if(!data){ if(!silent){ setRec(null); setErr("कोई आवेदन नहीं मिला। कृपया आवेदन संख्या जांचें।"); } setChecked(true); return; }
      if(mobile.trim() && data.mobile!==mobile.trim()){
        if(!silent){ setRec(null); setErr("मोबाइल नंबर आवेदन से मेल नहीं खाता।"); }
        setChecked(true); return;
      }
      setRec(data); setErr(""); setChecked(true);
    }catch(e){
      if(!silent) setErr("डेटा प्राप्त करने में त्रुटि हुई।");
    }
  },[appNo,mobile]);

  useEffect(()=>{
    if(!rec) return;
    const channel = sb.channel(`status-${rec.id}`)
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:TABLE,filter:`app_no=eq.${rec.id}`},
        payload=>{ setRec(fromRow(payload.new)); })
      .subscribe();
    chanRef.current=channel;
    const poll=setInterval(()=>check(true),6000);
    return ()=>{ sb.removeChannel(channel); clearInterval(poll); };
  },[rec && rec.id]);

  return (
    <div className="card">
      <div className="form-meta"><h2>आवेदन की स्थिति जांचें</h2></div>
      <div className="status-search">
        <input type="text" placeholder="आवेदन पत्र संख्या (जैसे NMA/2026/0001)" value={appNo} onChange={e=>setAppNo(e.target.value)}/>
        <input type="tel" placeholder="मोबाइल नंबर (वैकल्पिक पुष्टि हेतु)" maxLength="10" value={mobile} onChange={e=>setMobile(e.target.value.replace(/\D/g,''))}/>
        <button className="btn btn-primary" onClick={()=>check(false)}>जांचें</button>
      </div>
      {err && <div className="err" style={{padding:"0 22px 16px"}}>{err}</div>}
      {rec && rec.paymentStatus==="paid" && rec.status==="approved" &&
        <>
          <Stepper stage="certificate"/>
          <CertificateView rec={rec}/>
          <div className="cert-actions" style={{paddingBottom:10}}>
            <button className="btn btn-gold" onClick={()=>window.print()}>🖨 प्रिंट करें</button>
          </div>
        </>
      }
      {rec && !(rec.paymentStatus==="paid" && rec.status==="approved") &&
        <>
          <Stepper stage={rec.paymentStatus==="unpaid"?"form":"payment"}/>
          <div className="status-card">
            {rec.photo && <img src={rec.photo} className="status-photo"/>}
            <div style={{marginBottom:10,fontSize:13,color:"var(--ink-soft)"}}>आवेदन पत्र संख्या</div>
            <div className="app-no" style={{marginTop:0}}>{rec.id}</div>
            <div style={{margin:"16px 0",display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
              <StatusBadge status={rec.status}/>
              <PaymentBadge paymentStatus={rec.paymentStatus}/>
            </div>
            <div style={{fontFamily:"'Poppins',sans-serif",fontSize:18,color:"var(--forest)",marginBottom:4}}>{rec.name}</div>
            <div style={{fontSize:13,color:"var(--ink-soft)"}}>पद: {rec.position || '—'} · जमा दिनांक: {rec.submittedDate}</div>
            {rec.status==="declined" && <p style={{color:"var(--maroon)",fontSize:13.5,marginTop:14}}>खेद है, आपका आवेदन इस बार स्वीकृत नहीं हो सका।</p>}
            {rec.status!=="declined" && rec.paymentStatus==="unpaid" && <p style={{color:"#8A6416",fontSize:13.5,marginTop:14}}>भुगतान शेष है। भुगतान पूर्ण करने हेतु "पंजीकरण फॉर्म" टैब में जाकर नया आवेदन खोलें या पूर्व आवेदन जारी रखें।</p>}
            {rec.status!=="declined" && rec.paymentStatus==="pending_verification" && <p style={{color:"#8A6416",fontSize:13.5,marginTop:14}}>आपका भुगतान सत्यापन हेतु लंबित है। सत्यापन के बाद प्रमाणपत्र यहीं उपलब्ध होगा।</p>}
            {rec.status!=="declined" && rec.paymentStatus==="paid" && rec.status!=="approved" && <p style={{color:"#8A6316",fontSize:13.5,marginTop:14}}>भुगतान सत्यापित हो गया है, आवेदन अनुमोदन हेतु लंबित है।</p>}
          </div>
        </>
      }
      {checked && !rec && !err && <div className="empty">कोई परिणाम नहीं मिला।</div>}
    </div>
  );
}

function toCSV(records){
  const cols=["id","status","name","parentName","dob","gender","mobile","email","village","post","tehsil","district","state","pin","qualification","board","passYear","percent","experienceDetail","experienceYears","hasVehicle","vehicleNo","hasLicense","licenseNo","area","docs","place","signature","submittedDate"];
  const esc=v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`;
  const rows=[cols.join(",")];
  records.forEach(r=>{
    rows.push(cols.map(c=>esc(c==='docs' ? (r.docs||[]).join('; ') : r[c])).join(","));
  });
  return rows.join("\n");
}
function downloadCSV(records){
  const blob=new Blob([toCSV(records)],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`nasha-mukti-registrations-${Date.now()}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function AdminPanel(){
  const [loggedIn,setLoggedIn]=useState(false);
  const [records,setRecords]=useState([]);
  const [loading,setLoading]=useState(true);
  const [loadErr,setLoadErr]=useState("");
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [selected,setSelected]=useState(null);
  const [toast,setToast]=useState("");

  const load=useCallback(async()=>{
    try{
      const recs=await dbFetchAll();
      setRecords(recs);
      setLoadErr("");
    }catch(e){
      setLoadErr("डेटा लोड नहीं हो सका। कृपया जांचें कि Supabase टेबल 'registrations' बन चुकी है और RLS नीतियां सही हैं (नीचे नोट देखें)।");
    }
    setLoading(false);
  },[]);

  useEffect(()=>{
    if(!loggedIn) return;
    load();
    const channel = sb.channel('admin-registrations')
      .on('postgres_changes',{event:'*',schema:'public',table:TABLE}, ()=>load())
      .subscribe();
    const poll=setInterval(load,6000);
    return ()=>{ sb.removeChannel(channel); clearInterval(poll); };
  },[loggedIn,load]);

  const showToast=(msg)=>{ setToast(msg); setTimeout(()=>setToast(""),2500); };

  const updateStatus=async(rec,status)=>{
    try{
      await dbUpdateStatus(rec.id,status);
      const updated={...rec,status};
      setRecords(prev=>prev.map(r=>r.id===rec.id?updated:r));
      setSelected(updated);
      showToast(status==="approved"?`${rec.name} का आवेदन स्वीकृत किया गया`: status==="declined"?`${rec.name} का आवेदन अस्वीकृत किया गया`:"स्थिति अद्यतन की गई");
    }catch(e){
      showToast("स्थिति अपडेट नहीं हो सकी।");
    }
  };

  const updatePayment=async(rec,paymentStatus)=>{
    try{
      await dbUpdatePayment(rec.id,{payment_status:paymentStatus});
      const updated={...rec,paymentStatus};
      setRecords(prev=>prev.map(r=>r.id===rec.id?updated:r));
      setSelected(updated);
      showToast(paymentStatus==="paid"?`${rec.name} का भुगतान सत्यापित किया गया`:"भुगतान स्थिति अद्यतन की गई");
    }catch(e){
      showToast("भुगतान स्थिति अपडेट नहीं हो सकी।");
    }
  };

  const filtered=records.filter(r=>{
    if(filter!=="all" && r.status!==filter) return false;
    if(!search.trim()) return true;
    const q=search.trim().toLowerCase();
    return (r.name||"").toLowerCase().includes(q) || (r.mobile||"").includes(q) || (r.id||"").toLowerCase().includes(q) || (r.district||"").toLowerCase().includes(q);
  });

  const counts={
    all:records.length,
    pending:records.filter(r=>r.status==="pending").length,
    approved:records.filter(r=>r.status==="approved").length,
    declined:records.filter(r=>r.status==="declined").length,
    paid:records.filter(r=>r.paymentStatus==="paid").length,
    payPending:records.filter(r=>r.paymentStatus==="pending_verification").length,
  };

  if(!loggedIn) return <AdminLogin onLogin={()=>setLoggedIn(true)}/>;

  return (
    <div>
      {loadErr &&
        <div className="setup-warning">⚠️ {loadErr}</div>}

      <div className="stats">
        <div className="stat"><div className="num">{counts.all}</div><div className="lbl">कुल आवेदन</div></div>
        <div className="stat"><div className="num">{counts.pending}</div><div className="lbl">लंबित</div></div>
        <div className="stat"><div className="num">{counts.approved}</div><div className="lbl">स्वीकृत</div></div>
        <div className="stat"><div className="num">{counts.declined}</div><div className="lbl">अस्वीकृत</div></div>
        <div className="stat"><div className="num">{counts.payPending}</div><div className="lbl">भुगतान सत्यापन लंबित</div></div>
        <div className="stat"><div className="num">{counts.paid}</div><div className="lbl">भुगतान सत्यापित</div></div>
      </div>

      <div className="admin-toolbar">
        <input type="text" placeholder="नाम, मोबाइल, आवेदन संख्या या जिला से खोजें..." value={search} onChange={e=>setSearch(e.target.value)}/>
        {[["all","सभी"],["pending","लंबित"],["approved","स्वीकृत"],["declined","अस्वीकृत"]].map(([k,l])=>(
          <button key={k} className={`filter-chip ${filter===k?'active':''}`} onClick={()=>setFilter(k)}>{l} ({counts[k]})</button>
        ))}
        <button className="btn btn-outline btn-sm" onClick={()=>downloadCSV(filtered)}>⬇ CSV भेजें / डाउनलोड करें</button>
      </div>

      {loading && <div className="loading">लोड हो रहा है...</div>}
      {!loading && filtered.length===0 && <div className="empty">कोई आवेदन नहीं मिला।</div>}
      {!loading && filtered.map(r=>(
        <div className="app-row" key={r.id} onClick={()=>setSelected(r)}>
          {r.photo ? <img src={r.photo} className="app-row-thumb"/> : <div className="app-row-thumb"/>}
          <div className="app-row-top">
            <div>
              <div className="app-row-name">{r.name}</div>
              <div className="app-row-sub">{r.id} · {r.mobile} · {r.district}{r.state?`, ${r.state}`:''}</div>
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
              <StatusBadge status={r.status}/>
              <PaymentBadge paymentStatus={r.paymentStatus}/>
            </div>
          </div>
        </div>
      ))}

      {selected &&
        <div className="modal-bg" onClick={()=>setSelected(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <h3>{selected.name}</h3>
              <button className="modal-close" onClick={()=>setSelected(null)}>×</button>
            </div>
            <div className="modal-body">
              {selected.photo && <img src={selected.photo} className="modal-photo"/>}
              <div style={{marginBottom:12,display:'flex',gap:8,flexWrap:'wrap'}}>
                <StatusBadge status={selected.status}/>
                <PaymentBadge paymentStatus={selected.paymentStatus}/>
              </div>
              {[
                ["आवेदन संख्या",selected.id],
                ["पद",selected.position],
                ["पिता/पति का नाम",selected.parentName],
                ["जन्म तिथि",selected.dob],
                ["आयु",calcAge(selected.dob)],
                ["लिंग",selected.gender],
                ["मोबाइल",selected.mobile],
                ["ईमेल",selected.email],
                ["पता",[selected.village,selected.post,selected.tehsil,selected.district,selected.state,selected.pin].filter(Boolean).join(", ")],
                ["योग्यता",selected.qualification==="अन्य"?selected.qualificationOther:selected.qualification],
                ["बोर्ड/विश्वविद्यालय",selected.board],
                ["उत्तीर्ण वर्ष",selected.passYear],
                ["प्रतिशत/ग्रेड",selected.percent],
                ["कार्य अनुभव",selected.experienceDetail],
                ["कुल अनुभव (वर्ष)",selected.experienceYears],
                ["दोपहिया वाहन",selected.hasVehicle + (selected.vehicleNo?` (${selected.vehicleNo})`:'')],
                ["ड्राइविंग लाइसेंस",selected.hasLicense + (selected.licenseNo?` (${selected.licenseNo})`:'')],
                ["इच्छित क्षेत्र",selected.area],
                ["संलग्न दस्तावेज",[...(selected.docs||[]).filter(d=>d!=="अन्य"), (selected.docs||[]).includes("अन्य")?selected.docsOther:null].filter(Boolean).join(", ")],
                ["हस्ताक्षर",selected.signature],
                ["जमा दिनांक",selected.submittedDate],
                ["UTR / लेन-देन संख्या",selected.utr],
              ].map(([k,v])=>(
                <div className="detail-row" key={k}><div className="k">{k}</div><div>{v || "—"}</div></div>
              ))}
            </div>
            <div className="modal-actions">
              <button className="btn btn-sm btn-approve" onClick={()=>updatePayment(selected,"paid")} disabled={selected.paymentStatus==="paid"}>✓ भुगतान सत्यापित करें</button>
              {selected.paymentStatus==="paid" &&
                <button className="btn btn-sm btn-outline" onClick={()=>updatePayment(selected,"unpaid")}>भुगतान रद्द करें</button>}
              <button className="btn btn-sm btn-approve" onClick={()=>updateStatus(selected,"approved")} disabled={selected.status==="approved"}>स्वीकृत करें</button>
              <button className="btn btn-sm btn-decline" onClick={()=>updateStatus(selected,"declined")} disabled={selected.status==="declined"}>अस्वीकार करें</button>
              {selected.status!=="pending" &&
                <button className="btn btn-sm btn-outline" onClick={()=>updateStatus(selected,"pending")}>लंबित करें</button>}
            </div>
          </div>
        </div>
      }
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

      </div>
      <div className="tabbar">
        <button className={`tab-btn ${tab==='form'?'active':''}`} onClick={()=>setTab('form')}>पंजीकरण फॉर्म</button>
        <button className={`tab-btn ${tab==='status'?'active':''}`} onClick={()=>setTab('status')}>स्थिति जांचें</button>
        <button className={`tab-btn ${tab==='admin'?'active':''}`} onClick={()=>setTab('admin')}>एडमिन पैनल</button>
      </div>
      <div className="content">
        {tab==='form' && <RegistrationForm/>}
        {tab==='status' && <StatusCheck/>}
        {tab==='admin' && <AdminPanel/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
