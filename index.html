function pad(n,len){return String(n).padStart(len,'0');}
function todayStr(){
  const d=new Date();
  return `${pad(d.getDate(),2)}/${pad(d.getMonth()+1,2)}/${d.getFullYear()}`;
}
function calcAge(dobStr){
  if(!dobStr) return '';
  const dob=new Date(dobStr);
  if(isNaN(dob)) return '';
  const t=new Date();
  let age=t.getFullYear()-dob.getFullYear();
  const m=t.getMonth()-dob.getMonth();
  if(m<0 || (m===0 && t.getDate()<dob.getDate())) age--;
  return age>=0 && age<120 ? age : '';
}

/* camelCase <-> snake_case row mapping */
function toRow(f){
  return {
    app_no: f.id, position: f.position, name: f.name, parent_name: f.parentName,

    has_license: f.hasLicense, license_no: f.licenseNo,

async function dbInsert(record){
  const {data,error} = await sb.from(TABLE).insert([toRow(record)]).select();
  if(error) throw error;
  return data && data[0] ? fromRow(data[0]) : record;
}
async function dbCount(){
  const {count,error} = await sb.from(TABLE).select('*',{count:'exact',head:true});
  if(error) return 0;
  return count || 0;
}
async function dbFetchByAppNo(appNo){
  const {data,error} = await sb.from(TABLE).select('*').eq('app_no',appNo).maybeSingle();
  if(error || !data) return null;
  return fromRow(data);
}
async function dbFetchAll(){
  const {data,error} = await sb.from(TABLE).select('*').order('submitted_at',{ascending:false});
  if(error) throw error;
  return (data||[]).map(fromRow);
}
async function dbUpdateStatus(appNo,status){
  const {error} = await sb.from(TABLE).update({status}).eq('app_no',appNo);
  if(error) throw error;
}

/* resize + compress a photo file to a small base64 jpeg */
function fileToCompressedBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const maxW=480;
        const scale=Math.min(1,maxW/img.width);
        const canvas=document.createElement('canvas');
        canvas.width=img.width*scale;
        canvas.height=img.height*scale;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',0.7));
      };
      img.onerror=reject;
      img.src=reader.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function Field({label,required,children,hint}){
  return (
    <div className="field">
      <label>{label}{required && <span className="req"> *</span>}</label>
      {children}
      {hint && <div className="hint">{hint}</div>}
    </div>
  );
}

function PhotoField({photo,onChange}){
  const fileRef=useRef(null);
  const camRef=useRef(null);
  const [busy,setBusy]=useState(false);
  const handleFile=async(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    setBusy(true);
    try{
      const b64=await fileToCompressedBase64(file);
      onChange(b64);
    }catch(err){ /* ignore */ }
    setBusy(false);
    e.target.value="";
  };
  return (
    <div className="photo-box">
      <div className="photo-preview">
        {photo ? <img src={photo} alt="फोटो"/> : (busy? "लोड हो रहा..." : "फोटो नहीं चुनी गई")}
      </div>
      <div className="photo-actions">
        <label className="btn btn-outline btn-sm">
          📁 गैलरी से चुनें
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>
        </label>
        <label className="btn btn-outline btn-sm">
          📷 कैमरा से खींचें
          <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleFile}/>
        </label>
        {photo && <button type="button" className="btn btn-outline btn-sm" onClick={()=>onChange("")}>हटाएं</button>}
      </div>
    </div>
  );
}

    if(!f.hasVehicle) return "कृपया दोपहिया वाहन संबंधी प्रश्न का उत्तर दें।";

    if(!f.declared) return "कृपया घोषणा स्वीकार करें।";

          <button className="btn btn-outline" style={{marginTop:14}} onClick={()=>{setResult(null); setF(emptyForm);}}>नया आवेदन भरें</button>
        </div>
      </div>
    );
  }

  return (

      <div className="form-meta">
        <h2>नौकरी हेतु आवेदन पत्र</h2>

function StatusBadge({status}){
  const map={pending:["लंबित","pending"],approved:["स्वीकृत","approved"],declined:["अस्वीकृत","declined"]};
  const [label,cls]=map[status]||map.pending;
  return <span className={`badge ${cls}`}>{label}</span>;
}

function StatusCheck(){
  const [mobile,setMobile]=useState("");
  const [appNo,setAppNo]=useState("");
  const [rec,setRec]=useState(null);
  const [err,setErr]=useState("");
  const [checked,setChecked]=useState(false);
  const chanRef=useRef(null);

  const check=useCallback(async(silent)=>{
    if(!silent) setErr("");
    if(!appNo.trim()){ if(!silent) setErr("कृपया आवेदन पत्र संख्या भरें।"); return; }
    try{
      const data=await dbFetchByAppNo(appNo.trim());
      if(!data){ if(!silent){ setRec(null); setErr("कोई आवेदन नहीं मिला। कृपया आवेदन संख्या जांचें।"); } setChecked(true); return; }
      if(mobile.trim() && data.mobile!==mobile.trim()){
        if(!silent){ setRec(null); setErr("मोबाइल नंबर आवेदन से मेल नहीं खाता।"); }
        setChecked(true); return;
      }
      setRec(data); setErr(""); setChecked(true);
    }catch(e){
      if(!silent) setErr("डेटा प्राप्त करने में त्रुटि हुई।");
    }
  },[appNo,mobile]);

  useEffect(()=>{
    if(!rec) return;
    const channel = sb.channel(`status-${rec.id}`)
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:TABLE,filter:`app_no=eq.${rec.id}`},
        payload=>{ setRec(fromRow(payload.new)); })
      .subscribe();
    chanRef.current=channel;
    const poll=setInterval(()=>check(true),6000);
    return ()=>{ sb.removeChannel(channel); clearInterval(poll); };
  },[rec && rec.id]);

  return (
    <div className="card">
      <div className="form-meta"><h2>आवेदन की स्थिति जांचें</h2></div>
      <div className="status-search">
        <input type="text" placeholder="आवेदन पत्र संख्या (जैसे NMA/2026/0001)" value={appNo} onChange={e=>setAppNo(e.target.value)}/>
        <input type="tel" placeholder="मोबाइल नंबर (वैकल्पिक पुष्टि हेतु)" maxLength="10" value={mobile} onChange={e=>setMobile(e.target.value.replace(/\D/g,''))}/>
        <button className="btn btn-primary" onClick={()=>check(false)}>जांचें</button>
      </div>
      {err && <div className="err" style={{padding:"0 22px 16px"}}>{err}</div>}
      {rec &&
        <div className="status-card">
          {rec.photo && <img src={rec.photo} className="status-photo"/>}
          <div style={{marginBottom:10,fontSize:13,color:"var(--ink-soft)"}}>आवेदन पत्र संख्या</div>
          <div className="app-no" style={{marginTop:0}}>{rec.id}</div>
          <div style={{margin:"16px 0"}}><StatusBadge status={rec.status}/></div>
          <div style={{fontFamily:"'Noto Serif Devanagari',serif",fontSize:18,color:"var(--forest)",marginBottom:4}}>{rec.name}</div>
          <div style={{fontSize:13,color:"var(--ink-soft)"}}>पद: {rec.position || '—'} · जमा दिनांक: {rec.submittedDate}</div>
          {rec.status==="approved" && <p style={{color:"#1F6B37",fontSize:13.5,marginTop:14}}>बधाई हो! आपका आवेदन स्वीकृत कर लिया गया है। आगे की जानकारी हेतु आपसे संपर्क किया जाएगा।</p>}
          {rec.status==="declined" && <p style={{color:"var(--maroon)",fontSize:13.5,marginTop:14}}>खेद है, आपका आवेदन इस बार स्वीकृत नहीं हो सका।</p>}
          {rec.status==="pending" && <p style={{color:"#8A6416",fontSize:13.5,marginTop:14}}>आपका आवेदन समीक्षा हेतु लंबित है। स्वीकृति मिलते ही यह पृष्ठ स्वतः अद्यतन हो जाएगा।</p>}
        </div>
      }
      {checked && !rec && !err && <div className="empty">कोई परिणाम नहीं मिला।</div>}
    </div>
  );
}

function toCSV(records){
  const cols=["id","status","name","parentName","dob","gender","mobile","email","village","post","tehsil","district","state","pin","qualification","board","passYear","percent","experienceDetail","experienceYears","hasVehicle","vehicleNo","hasLicense","licenseNo","area","docs","place","signature","submittedDate"];
  const esc=v=>`"${String(v==null?'':v).replace(/"/g,'""')}"`;
  const rows=[cols.join(",")];
  records.forEach(r=>{
    rows.push(cols.map(c=>esc(c==='docs' ? (r.docs||[]).join('; ') : r[c])).join(","));
  });
  return rows.join("\n");
}
function downloadCSV(records){
  const blob=new Blob([toCSV(records)],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`nasha-mukti-registrations-${Date.now()}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function AdminPanel(){
  const [loggedIn,setLoggedIn]=useState(false);
  const [records,setRecords]=useState([]);
  const [loading,setLoading]=useState(true);
  const [loadErr,setLoadErr]=useState("");
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [selected,setSelected]=useState(null);
  const [toast,setToast]=useState("");

  const load=useCallback(async()=>{
    try{
      const recs=await dbFetchAll();
      setRecords(recs);
      setLoadErr("");
    }catch(e){
      setLoadErr("डेटा लोड नहीं हो सका। कृपया जांचें कि Supabase टेबल 'registrations' बन चुकी है और RLS नीतियां सही हैं (नीचे नोट देखें)।");
    }
    setLoading(false);
  },[]);

  useEffect(()=>{
    if(!loggedIn) return;
    load();
    const channel = sb.channel('admin-registrations')
      .on('postgres_changes',{event:'*',schema:'public',table:TABLE}, ()=>load())
      .subscribe();
    const poll=setInterval(load,6000);
    return ()=>{ sb.removeChannel(channel); clearInterval(poll); };
  },[loggedIn,load]);

  const showToast=(msg)=>{ setToast(msg); setTimeout(()=>setToast(""),2500); };

  const updateStatus=async(rec,status)=>{
    try{
      await dbUpdateStatus(rec.id,status);
      const updated={...rec,status};
      setRecords(prev=>prev.map(r=>r.id===rec.id?updated:r));
      setSelected(updated);
      showToast(status==="approved"?`${rec.name} का आवेदन स्वीकृत किया गया`: status==="declined"?`${rec.name} का आवेदन अस्वीकृत किया गया`:"स्थिति अद्यतन की गई");
    }catch(e){
      showToast("स्थिति अपडेट नहीं हो सकी।");
    }
  };

  const filtered=records.filter(r=>{
    if(filter!=="all" && r.status!==filter) return false;
    if(!search.trim()) return true;
    const q=search.trim().toLowerCase();
    return (r.name||"").toLowerCase().includes(q) || (r.mobile||"").includes(q) || (r.id||"").toLowerCase().includes(q) || (r.district||"").toLowerCase().includes(q);
  });

  const counts={
    all:records.length,
    pending:records.filter(r=>r.status==="pending").length,
    approved:records.filter(r=>r.status==="approved").length,
    declined:records.filter(r=>r.status==="declined").length,
  };

  if(!loggedIn) return <AdminLogin onLogin={()=>setLoggedIn(true)}/>;

  return (
    <div>
      {loadErr &&
        <div className="setup-warning">⚠️ {loadErr}</div>}

      <div className="stats">
        <div className="stat"><div className="num">{counts.all}</div><div className="lbl">कुल आवेदन</div></div>
        <div className="stat"><div className="num">{counts.pending}</div><div className="lbl">लंबित</div></div>
        <div className="stat"><div className="num">{counts.approved}</div><div className="lbl">स्वीकृत</div></div>
        <div className="stat"><div className="num">{counts.declined}</div><div className="lbl">अस्वीकृत</div></div>
      </div>

      <div className="admin-toolbar">
        <input type="text" placeholder="नाम, मोबाइल, आवेदन संख्या या जिला से खोजें..." value={search} onChange={e=>setSearch(e.target.value)}/>
        {[["all","सभी"],["pending","लंबित"],["approved","स्वीकृत"],["declined","अस्वीकृत"]].map(([k,l])=>(
          <button key={k} className={`filter-chip ${filter===k?'active':''}`} onClick={()=>setFilter(k)}>{l} ({counts[k]})</button>
        ))}
        <button className="btn btn-outline btn-sm" onClick={()=>downloadCSV(filtered)}>⬇ CSV भेजें / डाउनलोड करें</button>
      </div>

      {loading && <div className="loading">लोड हो रहा है...</div>}
      {!loading && filtered.length===0 && <div className="empty">कोई आवेदन नहीं मिला।</div>}
      {!loading && filtered.map(r=>(
        <div className="app-row" key={r.id} onClick={()=>setSelected(r)}>
          {r.photo ? <img src={r.photo} className="app-row-thumb"/> : <div className="app-row-thumb"/>}
          <div className="app-row-top">
            <div>
              <div className="app-row-name">{r.name}</div>
              <div className="app-row-sub">{r.id} · {r.mobile} · {r.district}{r.state?`, ${r.state}`:''}</div>
            </div>
            <StatusBadge status={r.status}/>
          </div>
        </div>
      ))}

      {selected &&
        <div className="modal-bg" onClick={()=>setSelected(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <h3>{selected.name}</h3>
              <button className="modal-close" onClick={()=>setSelected(null)}>×</button>
            </div>
            <div className="modal-body">
              {selected.photo && <img src={selected.photo} className="modal-photo"/>}
              <div style={{marginBottom:12}}><StatusBadge status={selected.status}/></div>
              {[
                ["आवेदन संख्या",selected.id],
                ["पद",selected.position],
                ["पिता/पति का नाम",selected.parentName],
                ["जन्म तिथि",selected.dob],
                ["आयु",calcAge(selected.dob)],
                ["लिंग",selected.gender],
                ["मोबाइल",selected.mobile],
                ["ईमेल",selected.email],
                ["पता",[selected.village,selected.post,selected.tehsil,selected.district,selected.state,selected.pin].filter(Boolean).join(", ")],
                ["योग्यता",selected.qualification==="अन्य"?selected.qualificationOther:selected.qualification],
                ["बोर्ड/विश्वविद्यालय",selected.board],
                ["उत्तीर्ण वर्ष",selected.passYear],
                ["प्रतिशत/ग्रेड",selected.percent],
                ["कार्य अनुभव",selected.experienceDetail],
                ["कुल अनुभव (वर्ष)",selected.experienceYears],
                ["दोपहिया वाहन",selected.hasVehicle + (selected.vehicleNo?` (${selected.vehicleNo})`:'')],
                ["ड्राइविंग लाइसेंस",selected.hasLicense + (selected.licenseNo?` (${selected.licenseNo})`:'')],
                ["इच्छित क्षेत्र",selected.area],
                ["संलग्न दस्तावेज",[...(selected.docs||[]).filter(d=>d!=="अन्य"), (selected.docs||[]).includes("अन्य")?selected.docsOther:null].filter(Boolean).join(", ")],
                ["हस्ताक्षर",selected.signature],
                ["जमा दिनांक",selected.submittedDate],
              ].map(([k,v])=>(
                <div className="detail-row" key={k}><div className="k">{k}</div><div>{v || "—"}</div></div>
              ))}
            </div>
            <div className="modal-actions">
              <button className="btn btn-sm btn-approve" onClick={()=>updateStatus(selected,"approved")} disabled={selected.status==="approved"}>स्वीकृत करें</button>
              <button className="btn btn-sm btn-decline" onClick={()=>updateStatus(selected,"declined")} disabled={selected.status==="declined"}>अस्वीकार करें</button>
              {selected.status!=="pending" &&
                <button className="btn btn-sm btn-outline" onClick={()=>updateStatus(selected,"pending")}>लंबित करें</button>}
            </div>
          </div>
        </div>
      }
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("form");
  return (
    <div className="app">
      <div className="header">
        <div className="header-inner">
          <div className="logo-seal">🌿</div>
          <div>
            <h1>नशा मुक्ति अभियान</h1>
            <p>स्वस्थ समाज • सशक्त परिवार • उज्जवल भारत</p>
          </div>
        </div>
      </div>
      <div className="tabbar">
        <button className={`tab-btn ${tab==='form'?'active':''}`} onClick={()=>setTab('form')}>पंजीकरण फॉर्म</button>
        <button className={`tab-btn ${tab==='status'?'active':''}`} onClick={()=>setTab('status')}>स्थिति जांचें</button>
        <button className={`tab-btn ${tab==='admin'?'active':''}`} onClick={()=>setTab('admin')}>एडमिन पैनल</button>
      </div>
      <div className="content">
        {tab==='form' && <RegistrationForm/>}
        {tab==='status' && <StatusCheck/>}
        {tab==='admin' && <AdminPanel/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
