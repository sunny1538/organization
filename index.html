<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>नशा मुक्ति अभियान — स्वयंसेवक आवेदन</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600&display=swap');

:root{
  --forest:#151A2E;
  --forest-2:#2A3355;
  --sage:#6B7394;
  --paper:#F4F1EC;
  --paper-2:#E9E4D8;
  --gold:#E8863B;
  --gold-2:#F0A968;
  --maroon:#B23A3A;
  --ink:#1B1E2C;
  --ink-soft:#565C78;
  --line:#D9D3C4;
  --white:#FFFFFF;
}
*{box-sizing:border-box;}
body{margin:0;padding:0;background:var(--paper);color:var(--ink);
  font-family:'Noto Sans Devanagari','Noto Sans',sans-serif;}
.app{min-height:100vh;}

.header{background:linear-gradient(135deg,var(--forest) 0%,var(--forest-2) 100%);
  color:var(--white);padding:22px 20px 26px;position:relative;overflow:hidden;
  border-bottom:4px solid var(--gold);}
.header::after{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;
  border-radius:50%;border:1px solid rgba(232,134,59,0.18);}
.header-inner{max-width:820px;margin:0 auto;display:flex;align-items:center;gap:16px;position:relative;z-index:1;}
.logo-seal{width:56px;height:56px;border-radius:50%;background:var(--gold);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  border:2px solid rgba(255,255,255,0.5);font-size:26px;}
.header h1{font-family:'Poppins',sans-serif;font-weight:900;font-size:24px;margin:0 0 4px;}
.header p{margin:0;font-size:13.5px;color:var(--gold-2);}

.tabbar{max-width:820px;margin:0 auto;display:flex;gap:6px;padding:14px 20px 0;flex-wrap:wrap;}
.tab-btn{border:1px solid var(--line);background:var(--white);color:var(--ink-soft);
  padding:10px 16px;border-radius:10px 10px 0 0;font-size:14.5px;font-weight:600;
  cursor:pointer;font-family:inherit;border-bottom:none;}
.tab-btn.active{background:var(--paper);color:var(--forest);border-color:var(--forest);
  box-shadow:0 -2px 0 var(--gold) inset;}
.tab-btn:hover:not(.active){background:var(--paper-2);}

.content{max-width:820px;margin:0 auto;padding:22px 20px 60px;}
.card{background:var(--white);border:1px solid var(--line);border-radius:4px;
  box-shadow:0 1px 3px rgba(18,53,36,0.06);}

.form-meta{display:flex;justify-content:space-between;align-items:flex-start;
  padding:18px 22px;border-bottom:2px solid var(--forest);flex-wrap:wrap;gap:10px;}
.form-meta h2{font-family:'Poppins',sans-serif;font-size:20px;margin:0;color:var(--forest);}
.form-meta .meta-right{text-align:right;font-size:12.5px;color:var(--ink-soft);}
.free-note{display:inline-flex;align-items:center;gap:8px;background:#E4F1E8;
  border:1px solid #9BC7A9;color:#1F6B37;padding:8px 14px;border-radius:6px;
  font-size:13.5px;font-weight:600;margin:16px 22px 0;}

.section{padding:18px 22px;border-bottom:1px solid var(--line);}
.section:last-of-type{border-bottom:none;}
.section-title{display:flex;align-items:center;gap:10px;margin:0 0 16px;}
.section-num{width:26px;height:26px;border-radius:50%;background:var(--forest);color:var(--white);
  font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.section-title h3{font-family:'Poppins',sans-serif;font-size:16.5px;margin:0;color:var(--forest);}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;}
@media(max-width:600px){.grid2{grid-template-columns:1fr;}}
.field label{display:block;font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.field label .req{color:var(--maroon);}
.field input[type=text],.field input[type=tel],.field input[type=email],
.field input[type=date],.field input[type=number],.field select,.field textarea{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;
  font-family:inherit;font-size:14.5px;background:var(--paper);color:var(--ink);}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--sage);outline-offset:1px;background:var(--white);}
.field textarea{resize:vertical;min-height:64px;}
.hint{font-size:12px;color:var(--ink-soft);margin-top:4px;}
.radio-row,.check-row{display:flex;gap:18px;flex-wrap:wrap;padding-top:2px;}
.radio-opt,.check-opt{display:flex;align-items:center;gap:7px;font-size:14px;cursor:pointer;}
.radio-opt input,.check-opt input{width:16px;height:16px;accent-color:var(--forest);cursor:pointer;}

.photo-box{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.photo-preview{width:110px;height:110px;border-radius:8px;border:2px dashed var(--line);
  background:var(--paper);display:flex;align-items:center;justify-content:center;overflow:hidden;
  color:var(--ink-soft);font-size:11.5px;text-align:center;flex-shrink:0;}
.photo-preview img{width:100%;height:100%;object-fit:cover;}
.photo-actions{display:flex;gap:10px;flex-wrap:wrap;}
.photo-actions label.btn{display:inline-flex;align-items:center;gap:6px;}

.declaration{background:var(--paper-2);border:1px dashed var(--line);border-radius:6px;padding:14px 16px;font-size:13.5px;color:var(--ink-soft);line-height:1.6;}
.declaration label{display:flex;gap:10px;align-items:flex-start;cursor:pointer;color:var(--ink);font-weight:500;}
.declaration input{margin-top:3px;width:16px;height:16px;accent-color:var(--forest);flex-shrink:0;}

.submit-bar{padding:20px 22px;display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;}
.btn{border:none;border-radius:7px;padding:12px 26px;font-family:inherit;font-size:15px;
  font-weight:700;cursor:pointer;transition:transform .1s ease, filter .15s ease;}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--forest);color:var(--white);}
.btn-primary:hover{filter:brightness(1.1);}
.btn-primary:disabled{background:#9AA79E;cursor:not-allowed;}
.btn-outline{background:transparent;border:1.5px solid var(--forest);color:var(--forest);}
.err{color:var(--maroon);font-size:12.5px;margin-top:8px;}

.app-no{display:inline-block;background:var(--paper-2);border:1px solid var(--line);
  padding:10px 18px;border-radius:8px;font-family:monospace;font-size:18px;font-weight:700;
  letter-spacing:1px;color:var(--forest);margin:14px 0;}

.status-search{display:flex;gap:10px;flex-wrap:wrap;padding:22px;}
.status-search input{flex:1;min-width:180px;padding:11px 14px;border:1px solid var(--line);
  border-radius:7px;font-family:inherit;font-size:14.5px;background:var(--paper);}
.status-card{margin:0 22px 22px;border:1px solid var(--line);border-radius:8px;padding:22px;
  background:var(--paper-2);text-align:center;}
.status-photo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--white);
  box-shadow:0 0 0 2px var(--line);margin-bottom:10px;}
.badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;
  font-size:13px;font-weight:700;letter-spacing:0.3px;}
.badge.pending{background:#FCEFD0;color:#8A6416;}
.badge.approved{background:#D9F0DE;color:#1F6B37;}
.badge.declined{background:#F6DAD6;color:var(--maroon);}
.empty{text-align:center;padding:50px 20px;color:var(--ink-soft);}
.success-wrap{text-align:center;padding:44px 24px;}
.stamp{width:110px;height:110px;border-radius:50%;border:4px solid var(--forest);
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  color:var(--forest);font-weight:900;font-size:14px;text-align:center;line-height:1.3;
  transform:rotate(-8deg);font-family:'Poppins',sans-serif;}
.note{font-size:11.5px;color:var(--ink-soft);text-align:center;padding:10px 22px 0;}

@media(max-width:600px){
  .header{padding:16px 14px 20px;}
  .header h1{font-size:20px;}
  .content{padding:14px 10px 40px;}
  .field input,.field select,.field textarea{font-size:16px;padding:11px 12px;}
  .submit-bar .btn{width:100%;}
  .status-search{flex-direction:column;padding:16px;}
  .status-search .btn{width:100%;}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback} = React;

/* ---------- Supabase setup ---------- */
const SUPABASE_URL = "https://lcljvptftxqfzftkoudx.supabase.co";
const SUPABASE_KEY = "sb_publishable_abe9rgF4HslhKU32hC_VPg_bC3EWK5V";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const TABLE = "registrations";
const ORG_NAME = "नशा मुक्ति अभियान";

function pad(n,len){return String(n).padStart(len,'0');}
function todayStr(){
  const d=new Date();
  return `${pad(d.getDate(),2)}/${pad(d.getMonth()+1,2)}/${d.getFullYear()}`;
}
function calcAge(dobStr){
  if(!dobStr) return '';
  const dob=new Date(dobStr);
  if(isNaN(dob)) return '';
  const t=new Date();
  let age=t.getFullYear()-dob.getFullYear();
  const m=t.getMonth()-dob.getMonth();
  if(m<0 || (m===0 && t.getDate()<dob.getDate())) age--;
  return age>=0 && age<120 ? age : '';
}

const AREA_OPTIONS=[
  "शहरी क्षेत्र जागरूकता","ग्रामीण क्षेत्र जागरूकता","स्कूल/कॉलेज कार्यक्रम",
  "पुनर्वास केंद्र सहायता","कार्यालय प्रशासन","अन्य"
];

// Note: no ID-proof / bank-document options here by design.
const DOC_OPTIONS=["पासपोर्ट आकार फोटो","शैक्षणिक प्रमाण पत्र","अनुभव प्रमाण पत्र (यदि हो)","अन्य"];

const emptyForm={
  position:"", name:"", parentName:"", dob:"", gender:"", mobile:"", email:"",
  village:"", post:"", tehsil:"", district:"", state:"", pin:"",
  qualification:"", qualificationOther:"", board:"", passYear:"", percent:"",
  experienceDetail:"", experienceYears:"",
  hasVehicle:"", vehicleNo:"",
  hasLicense:"", licenseNo:"",
  area:"", docs:[], docsOther:"",
  place:"", signature:"", declared:false,
  photo:""
};

function genAppNo(){
  const y=new Date().getFullYear();
  const rand=Math.floor(1000+Math.random()*9000);
  return `NMA/${y}/${rand}`;
}

function toRow(f){
  return {
    app_no: f.id, position: f.position, name: f.name, parent_name: f.parentName,
    dob: f.dob || null, gender: f.gender, mobile: f.mobile, email: f.email,
    village: f.village, post: f.post, tehsil: f.tehsil, district: f.district,
    state: f.state, pin: f.pin,
    qualification: f.qualification, qualification_other: f.qualificationOther,
    board: f.board, pass_year: f.passYear, percent: f.percent,
    experience_detail: f.experienceDetail, experience_years: f.experienceYears,
    has_vehicle: f.hasVehicle, vehicle_no: f.vehicleNo,
    has_license: f.hasLicense, license_no: f.licenseNo,
    area: f.area, docs: f.docs, docs_other: f.docsOther,
    place: f.place, signature: f.signature,
    photo_base64: f.photo || null,
    status: "pending", submitted_at: f.submittedAt
  };
}

async function dbInsert(record){
  const {data,error} = await sb.from(TABLE).insert([toRow(record)]).select();
  if(error) throw error;
  return data && data[0] ? data[0] : record;
}

/* resize + compress a photo file to a small base64 jpeg */
function fileToCompressedBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const maxW=480;
        const scale=Math.min(1,maxW/img.width);
        const canvas=document.createElement('canvas');
        canvas.width=img.width*scale;
        canvas.height=img.height*scale;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',0.7));
      };
      img.onerror=reject;
      img.src=reader.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function Field({label,required,children,hint}){
  return (
    <div className="field">
      <label>{label}{required && <span className="req"> *</span>}</label>
      {children}
      {hint && <div className="hint">{hint}</div>}
    </div>
  );
}

function PhotoField({photo,onChange}){
  const fileRef=useRef(null);
  const camRef=useRef(null);
  const [busy,setBusy]=useState(false);
  const handleFile=async(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    setBusy(true);
    try{
      const b64=await fileToCompressedBase64(file);
      onChange(b64);
    }catch(err){ /* ignore */ }
    setBusy(false);
    e.target.value="";
  };
  return (
    <div className="photo-box">
      <div className="photo-preview">
        {photo ? <img src={photo} alt="फोटो"/> : (busy? "लोड हो रहा..." : "फोटो नहीं चुनी गई")}
      </div>
      <div className="photo-actions">
        <label className="btn btn-outline btn-sm">
          📁 गैलरी से चुनें
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>
        </label>
        <label className="btn btn-outline btn-sm">
          📷 कैमरा से खींचें
          <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleFile}/>
        </label>
        {photo && <button type="button" className="btn btn-outline btn-sm" onClick={()=>onChange("")}>हटाएं</button>}
      </div>
    </div>
  );
}

function RegistrationForm(){
  const [f,setF]=useState(emptyForm);
  const [error,setError]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [result,setResult]=useState(null);

  const set=(k,v)=>setF(prev=>({...prev,[k]:v}));
  const toggleDoc=(doc)=>{
    setF(prev=>{
      const has=prev.docs.includes(doc);
      return {...prev, docs: has? prev.docs.filter(d=>d!==doc): [...prev.docs,doc]};
    });
  };

  const validate=()=>{
    if(!f.position.trim()) return "कृपया पद हेतु आवेदन भरें।";
    if(!f.name.trim()) return "कृपया आवेदक का नाम भरें।";
    if(!f.dob) return "कृपया जन्म तिथि भरें।";
    if(!f.gender) return "कृपया लिंग चुनें।";
    if(!/^[6-9]\d{9}$/.test(f.mobile)) return "कृपया मान्य 10 अंकों का मोबाइल नंबर भरें।";
    if(!f.district.trim() || !f.state.trim()) return "कृपया जिला और राज्य भरें।";
    if(f.pin && !/^\d{6}$/.test(f.pin)) return "पिन कोड 6 अंकों का होना चाहिए।";
    if(!f.qualification) return "कृपया शैक्षणिक योग्यता चुनें।";
    if(!f.hasVehicle) return "कृपया दोपहिया वाहन संबंधी प्रश्न का उत्तर दें।";
    if(!f.area) return "कृपया कार्यक्षेत्र चुनें।";
    if(!f.declared) return "कृपया घोषणा स्वीकार करें।";
    return "";
  };

  const submit=async()=>{
    const err=validate();
    if(err){ setError(err); return; }
    setError(""); setSubmitting(true);
    try{
      const appNo=genAppNo();
      const record={...f, id:appNo, submittedAt:new Date().toISOString()};
      await dbInsert(record);
      setResult({...record, submittedDate: todayStr()});
    }catch(e){
      setError("जमा करते समय त्रुटि हुई। कृपया पुनः प्रयास करें, या हमसे संपर्क करें।");
    }
    setSubmitting(false);
  };

  if(result){
    return (
      <div className="card">
        <div className="success-wrap">
          <div className="stamp">आवेदन<br/>प्राप्त हुआ</div>
          <h2 style={{fontFamily:"'Poppins',sans-serif",color:"var(--forest)",margin:"0 0 6px"}}>धन्यवाद, {result.name}!</h2>
          <p style={{color:"var(--ink-soft)",fontSize:14}}>आपका आवेदन सफलतापूर्वक जमा हो गया है। कृपया यह आवेदन संख्या सुरक्षित रखें।</p>
          <div className="app-no">{result.id}</div>
          <p style={{color:"var(--ink-soft)",fontSize:13.5,maxWidth:440,margin:"10px auto 0"}}>
            "स्थिति जांचें" टैब में जाकर इसी आवेदन संख्या और मोबाइल नंबर से अपने आवेदन की प्रगति देख सकते हैं।
            स्वीकृति के बाद हमारी टीम आपसे दिए गए मोबाइल नंबर पर संपर्क करेगी।
          </p>
          <button className="btn btn-outline" style={{marginTop:20}} onClick={()=>{setResult(null); setF(emptyForm);}}>नया आवेदन भरें</button>
        </div>
      </div>
    );
  }

  return (
    <div className="card">
      <div className="form-meta">
        <h2>स्वयंसेवक आवेदन पत्र</h2>
        <div className="meta-right">दिनांक: {todayStr()}</div>
      </div>
      <div className="free-note">✓ यह आवेदन पूर्णतः निःशुल्क है — किसी भी प्रकार का शुल्क न दें</div>

      <div className="section">
        <Field label="पद हेतु आवेदन" required>
          <input type="text" value={f.position} onChange={e=>set('position',e.target.value)} placeholder="जिस पद हेतु आवेदन कर रहे हैं वह लिखें"/>
        </Field>
      </div>

      <div className="section">
        <div className="section-title"><div className="section-num">1</div><h3>व्यक्तिगत जानकारी</h3></div>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:13.5,fontWeight:600,marginBottom:8,display:'block'}}>पासपोर्ट साइज़ फोटो</label>
          <PhotoField photo={f.photo} onChange={v=>set('photo',v)}/>
        </div>
        <div className="grid2">
          <Field label="आवेदक का नाम" required><input type="text" value={f.name} onChange={e=>set('name',e.target.value)}/></Field>
          <Field label="पिता / पति का नाम"><input type="text" value={f.parentName} onChange={e=>set('parentName',e.target.value)}/></Field>
          <Field label="जन्म तिथि" required><input type="date" value={f.dob} onChange={e=>set('dob',e.target.value)}/></Field>
          <Field label="आयु" hint="जन्म तिथि से स्वतः गणना"><input type="text" value={calcAge(f.dob)} readOnly/></Field>
          <Field label="मोबाइल नंबर" required><input type="tel" maxLength="10" value={f.mobile} onChange={e=>set('mobile',e.target.value.replace(/\D/g,''))} placeholder="10 अंकों का नंबर"/></Field>
          <Field label="ईमेल (यदि हो)"><input type="email" value={f.email} onChange={e=>set('email',e.target.value)}/></Field>
        </div>
        <div style={{marginTop:14}}>
          <label style={{fontSize:13.5,fontWeight:600,marginBottom:8,display:'block'}}>लिंग <span className="req">*</span></label>
          <div className="radio-row">
            {["पुरुष","महिला","अन्य"].map(g=>(
              <label className="radio-opt" key={g}><input type="radio" name="gender" checked={f.gender===g} onChange={()=>set('gender',g)}/>{g}</label>
            ))}
          </div>
        </div>
      </div>

      <div className="section">
        <div className="section-title"><div className="section-num">2</div><h3>स्थायी पता</h3></div>
        <div className="grid2">
          <Field label="ग्राम / वार्ड"><input type="text" value={f.village} onChange={e=>set('village',e.target.value)}/></Field>
          <Field label="पोस्ट"><input type="text" value={f.post} onChange={e=>set('post',e.target.value)}/></Field>
          <Field label="तहसील"><input type="text" value={f.tehsil} onChange={e=>set('tehsil',e.target.value)}/></Field>
          <Field label="जिला" required><input type="text" value={f.district} onChange={e=>set('district',e.target.value)}/></Field>
          <Field label="राज्य" required><input type="text" value={f.state} onChange={e=>set('state',e.target.value)}/></Field>
          <Field label="पिन कोड"><input type="text" maxLength="6" value={f.pin} onChange={e=>set('pin',e.target.value.replace(/\D/g,''))}/></Field>
        </div>
      </div>

      <div className="section">
        <div className="section-title"><div className="section-num">3</div><h3>शैक्षणिक योग्यता</h3></div>
        <div className="check-row" style={{marginBottom:14}}>
          {["10वीं","12वीं","स्नातक","स्नातकोत्तर","अन्य"].map(q=>(
            <label className="radio-opt" key={q}><input type="radio" name="qual" checked={f.qualification===q} onChange={()=>set('qualification',q)}/>{q}</label>
          ))}
        </div>
        {f.qualification==="अन्य" &&
          <Field label="कृपया स्पष्ट करें"><input type="text" value={f.qualificationOther} onChange={e=>set('qualificationOther',e.target.value)}/></Field>}
        <div className="grid2" style={{marginTop:14}}>
          <Field label="बोर्ड / विश्वविद्यालय"><input type="text" value={f.board} onChange={e=>set('board',e.target.value)}/></Field>
          <Field label="उत्तीर्ण वर्ष"><input type="text" maxLength="4" value={f.passYear} onChange={e=>set('passYear',e.target.value.replace(/\D/g,''))}/></Field>
          <Field label="प्रतिशत / ग्रेड"><input type="text" value={f.percent} onChange={e=>set('percent',e.target.value)}/></Field>
        </div>
      </div>

      <div className="section">
        <div className="section-title"><div className="section-num">4</div><h3>क्या आपके पास दोपहिया वाहन है?</h3></div>
        <div className="radio-row">
          {["हाँ","नहीं"].map(o=>(
            <label className="radio-opt" key={o}><input type="radio" name="veh" checked={f.hasVehicle===o} onChange={()=>set('hasVehicle',o)}/>{o}</label>
          ))}
        </div>
        {f.hasVehicle==="हाँ" &&
          <div style={{marginTop:12,maxWidth:280}}>
            <Field label="वाहन संख्या"><input type="text" value={f.vehicleNo} onChange={e=>set('vehicleNo',e.target.value)}/></Field>
          </div>}
      </div>

      <div className="section">
        <div className="section-title"><div className="section-num">5</div><h3>आप किस क्षेत्र में कार्य करना चाहते हैं?</h3></div>
        <div style={{maxWidth:340}}>
          <select value={f.area} onChange={e=>set('area',e.target.value)}>
            <option value="">-- चुनें --</option>
            {AREA_OPTIONS.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </div>
      </div>

      <div className="section">
        <div className="declaration">
          <label>
            <input type="checkbox" checked={f.declared} onChange={e=>set('declared',e.target.checked)}/>
            मैं घोषणा करता/करती हूँ कि इस आवेदन पत्र में दी गई सभी जानकारी मेरे ज्ञान के अनुसार सही एवं सत्य है। यदि कोई जानकारी असत्य पाई जाती है, तो मेरा आवेदन निरस्त किया जा सकता है।
          </label>
        </div>
      </div>

      <div className="submit-bar" style={{flexDirection:'column',alignItems:'flex-end'}}>
        {error && <div className="err">{error}</div>}
        <button className="btn btn-primary" disabled={submitting} onClick={submit}>
          {submitting? "जमा हो रहा है...":"आवेदन जमा करें"}
        </button>
      </div>
      <div className="note">यह आवेदन पूर्णतः निःशुल्क है। स्वीकृति के बाद हमारी टीम आपसे संपर्क करेगी।</div>
    </div>
  );
}

function StatusBadge({status}){
  const map={pending:["लंबित","pending"],approved:["स्वीकृत","approved"],declined:["अस्वीकृत","declined"]};
  const [label,cls]=map[status]||map.pending;
  return <span className={`badge ${cls}`}>{label}</span>;
}

function StatusCheck(){
  const [mobile,setMobile]=useState("");
  const [appNo,setAppNo]=useState("");
  const [rec,setRec]=useState(null);
  const [err,setErr]=useState("");
  const [checked,setChecked]=useState(false);
  const [busy,setBusy]=useState(false);

  const check=useCallback(async()=>{
    setErr("");
    if(!appNo.trim() || !mobile.trim()){ setErr("कृपया आवेदन संख्या और मोबाइल नंबर दोनों भरें।"); return; }
    setBusy(true);
    try{
      const {data,error}=await sb.rpc('check_application_status',{p_app_no:appNo.trim(), p_mobile:mobile.trim()});
      if(error || !data || data.length===0){
        setRec(null);
        setErr("कोई मिलान आवेदन नहीं मिला। कृपया आवेदन संख्या और मोबाइल नंबर जांचें।");
      } else {
        setRec(data[0]);
      }
    }catch(e){
      setErr("डेटा प्राप्त करने में त्रुटि हुई।");
    }
    setChecked(true);
    setBusy(false);
  },[appNo,mobile]);

  return (
    <div className="card">
      <div className="form-meta"><h2>आवेदन की स्थिति जांचें</h2></div>
      <div className="status-search">
        <input type="text" placeholder="आवेदन संख्या (जैसे NMA/2026/1234)" value={appNo} onChange={e=>setAppNo(e.target.value)}/>
        <input type="tel" placeholder="मोबाइल नंबर" maxLength="10" value={mobile} onChange={e=>setMobile(e.target.value.replace(/\D/g,''))}/>
        <button className="btn btn-primary" disabled={busy} onClick={check}>{busy?"जांच रहे हैं...":"जांचें"}</button>
      </div>
      {err && <div className="err" style={{padding:"0 22px 16px"}}>{err}</div>}
      {rec &&
        <div className="status-card">
          {rec.photo_base64 && <img src={rec.photo_base64} className="status-photo"/>}
          <div style={{marginBottom:10,fontSize:13,color:"var(--ink-soft)"}}>आवेदन संख्या</div>
          <div className="app-no" style={{marginTop:0}}>{rec.app_no}</div>
          <div style={{margin:"16px 0"}}><StatusBadge status={rec.status}/></div>
          <div style={{fontFamily:"'Poppins',sans-serif",fontSize:18,color:"var(--forest)",marginBottom:4}}>{rec.name}</div>
          <div style={{fontSize:13,color:"var(--ink-soft)"}}>पद: {rec.position || '—'} · जिला: {rec.district || '—'}</div>
          {rec.status==="declined" && <p style={{color:"var(--maroon)",fontSize:13.5,marginTop:14}}>खेद है, आपका आवेदन इस बार स्वीकृत नहीं हो सका।</p>}
          {rec.status==="pending" && <p style={{color:"#8A6416",fontSize:13.5,marginTop:14}}>आपका आवेदन समीक्षाधीन है। स्वीकृति मिलते ही हमारी टीम आपसे संपर्क करेगी।</p>}
          {rec.status==="approved" && <p style={{color:"#1F6B37",fontSize:13.5,marginTop:14}}>बधाई हो! आपका आवेदन स्वीकृत हो गया है। हमारी टीम शीघ्र ही आपसे संपर्क करेगी।</p>}
        </div>
      }
      {checked && !rec && !err && <div className="empty">कोई परिणाम नहीं मिला।</div>}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("form");
  return (
    <div className="app">
      <div className="header">
        <div className="header-inner">
          <div className="logo-seal">🌿</div>
          <div>
            <h1>नशा मुक्ति अभियान</h1>
            <p>स्वस्थ समाज • सशक्त परिवार • उज्जवल भारत</p>
          </div>
        </div>
      </div>
      <div className="tabbar">
        <button className={`tab-btn ${tab==='form'?'active':''}`} onClick={()=>setTab('form')}>आवेदन फॉर्म</button>
        <button className={`tab-btn ${tab==='status'?'active':''}`} onClick={()=>setTab('status')}>स्थिति जांचें</button>
      </div>
      <div className="content">
        {tab==='form' && <RegistrationForm/>}
        {tab==='status' && <StatusCheck/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
